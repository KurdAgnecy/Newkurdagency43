        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #050a07;
        }

        body { 
            background-image: 
                radial-gradient(circle at 50% -20%, #124d2d, transparent),
                radial-gradient(circle at 0% 100%, #0a2012, transparent);
            font-family: sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #fff;
        }

        .main-wrapper {
            width: 100%; 
            height: 100%; 
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            text-align: center;
        }

        .top-brand-small {
            font-size: 0.65rem;
            font-weight: 800;
            color: #25d366;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .phone-ring-svg {
            width: 60px;
            height: 60px;
            margin: 0 auto;
            fill: #fff;
            animation: ring 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.25));
        }

        @keyframes ring {
            0% { transform: rotate(0); }
            10% { transform: rotate(-15deg); }
            20% { transform: rotate(15deg); }
            30% { transform: rotate(-15deg); }
            40% { transform: rotate(15deg); }
            50% { transform: rotate(0); }
            100% { transform: rotate(0); }
        }

        .instruction {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 15px;
            color: #ffffff;
            line-height: 1.4;
        }

        .arrow-down-svg {
            width: 35px;
            height: 35px;
            margin: 10px auto;
            fill: #25d366;
            animation: bounceDown 1.2s infinite;
        }

        @keyframes bounceDown {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(12px); opacity: 1; }
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: flex; 
            align-items: center;
            padding: 20px 16px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .link-item.whatsapp { border-right: 5px solid #25d366; }
        .link-item.phone { border-right: 5px solid #ffffff; }

        .link-item svg {
            width: 35px;
            height: 35px;
            margin-left: 15px;
            animation: iconShake 2.5s infinite;
        }

        @keyframes iconShake {
            0%, 80%, 100% { transform: rotate(0); }
            85% { transform: rotate(10deg); }
            90% { transform: rotate(-10deg); }
            95% { transform: rotate(10deg); }
        }

        .link-item span { flex-grow: 1; text-align: right; }
        .link-item small { display: block; font-size: 1.1rem; opacity: 0.9; direction: ltr; margin-top: 4px; }

        .footer-section {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            text-decoration: none;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 5px;
        }

        .footer-brand { font-size: 0.9rem; font-weight: 800; color: #fff; letter-spacing: 1px; }
        .footer-slogan { font-size: 0.65rem; color: #888; margin: 4px 0; }
        .contact-us-text { font-size: 0.6rem; color: #25d366; font-weight: bold; text-transform: uppercase; }
